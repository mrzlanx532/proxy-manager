networks:
  proxy-manager:

services:
  nginx:
    build:
      context: ./
      dockerfile: ./docker/nginx/dev.Dockerfile
      args:
        LOCAL_LINUX_USER: ${LOCAL_LINUX_USER:-0}
        LOCAL_LINUX_USER_UID: ${LOCAL_LINUX_USER_UID:-0}
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - proxy-manager

  mysql:
    image: mysql:8.0
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    container_name: mysql
    tty: true
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql:delegated
      - ./docker/mysql/scripts:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: root
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    networks:
      - proxy-manager

  php:
    build:
      context: .
      dockerfile: ./docker/php/dev.Dockerfile
      args:
        LOCAL_LINUX_USER: ${LOCAL_LINUX_USER:-0}
        LOCAL_LINUX_USER_UID: ${LOCAL_LINUX_USER_UID:-0}
    container_name: php
    volumes:
      - .:/var/www/html
    ports:
      - "9000:9000"
    networks:
      - proxy-manager
    depends_on:
      - mysql
